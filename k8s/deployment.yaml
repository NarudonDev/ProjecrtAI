apiVersion: apps/v1
kind: Deployment
metadata:
  name: projecrtai-web
  namespace: projecrtai
  labels:
    app: projecrtai-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projecrtai-web
  template:
    metadata:
      labels:
        app: projecrtai-web
    spec:
      containers:
        - name: web
          image: ghcr.io/narudondev/projecrtai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
